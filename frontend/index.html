<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG AI — Verified Answers</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 { color: #333; text-align: center; }
    textarea {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-top: 10px;
    }
    button {
      margin-top: 10px;
      padding: 12px 30px;
      background: #6c63ff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover { background: #574fd6; }
    #answer-card {
      margin-top: 20px;
      padding: 20px;
      background: white;
      border-radius: 8px;
      border: 1px solid #ddd;
      display: none;
    }
    .badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: bold;
    }
    .cache { background: #d4edda; color: #155724; }
    .ai { background: #cce5ff; color: #004085; }
  </style>
</head>
<body>
  <h1>🧠 RAG Verified AI</h1>
  <p style="text-align:center">Answers grounded in your knowledge base</p>

  <textarea id="question" rows="3"
    placeholder="Type your question here..."></textarea>
  <br/>
  <button onclick="askQuestion()">Ask</button>

  <div id="answer-card">
    <span id="source-badge" class="badge"></span>
    <p id="answer-text" style="margin-top:10px"></p>
  </div>

  <script>
    async function askQuestion() {
      const question = document.getElementById("question").value.trim();
      if (!question) return;

      document.getElementById("answer-card").style.display = "none";

      try {
        const res = await fetch("http://localhost:5000/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question })
        });
        const data = await res.json();

        const badge = document.getElementById("source-badge");
        badge.textContent = data.source === "cache"
          ? "✓ Cached Answer"
          : "✓ Generated by AI";
        badge.className = "badge " + 
          (data.source === "cache" ? "cache" : "ai");

        document.getElementById("answer-text").textContent = 
          data.answer || data.error;
        document.getElementById("answer-card").style.display = "block";

      } catch (err) {
        alert("Could not reach server. Is Flask running?");
      }
    }
  </script>
</body>
</html>
